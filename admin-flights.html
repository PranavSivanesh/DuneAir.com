<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dune Air — Admin Flight Management</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
  <header class="navbar small">
    <div class="container nav-content">
      <a href="index.html" class="logo" style="text-decoration: none; color: inherit;">Dune Air</a>
      <nav>
        <a href="index.html">Back to Home</a>
        <span style="color: #4caf50; font-size: 0.85em; font-weight: 700;">● ADMIN MODE</span>
      </nav>
    </div>
  </header>

  <section class="container page-content">
    <h2 class="page-title">Flight Management</h2>

    <!-- New flight button -->
    <div style="margin-bottom: 30px; text-align: right;">
      <button id="createFlightBtn" class="btn primary">+ Create New Flight</button>
    </div>

    <!-- Flights table -->
    <div class="booking-card">
      <h3>All Flights</h3>
      <div id="flightsTable" style="overflow-x: auto;">
        <p style="text-align: center; color: #999;">Loading flights...</p>
      </div>
    </div>
  </section>

  <!-- Create/Edit flight modal -->
  <div id="flightModal" class="modal-overlay" style="display: none;">
    <div class="modal-content" style="max-width: 600px;">
      <div class="modal-header">
        <h3 id="flightModalTitle">Create New Flight</h3>
        <span class="close-flight-modal">&times;</span>
      </div>
      <form id="flightForm" class="modal-form">
        <input type="hidden" id="flightFormMode" value="create">
        <input type="hidden" id="originalFlightId" value="">

        <label style="font-weight: 600; margin-bottom: 5px; display: block;">Flight ID *</label>
        <input type="text" id="flightId" placeholder="e.g., DA123" required class="form-input" pattern="[A-Z]{2}[0-9]{1,4}">

        <label style="font-weight: 600; margin-bottom: 5px; display: block;">Origin (Airport Code) *</label>
        <input type="text" id="origin" placeholder="e.g., DXB" required class="form-input" maxlength="3" pattern="[A-Z]{3}">

        <label style="font-weight: 600; margin-bottom: 5px; display: block;">Destination (Airport Code) *</label>
        <input type="text" id="destination" placeholder="e.g., LHR" required class="form-input" maxlength="3" pattern="[A-Z]{3}">

        <label style="font-weight: 600; margin-bottom: 5px; display: block;">Departure Time *</label>
        <input type="datetime-local" id="departureTime" required class="form-input">

        <label style="font-weight: 600; margin-bottom: 5px; display: block;">First Class Price (AED)</label>
        <input type="number" id="firstClassPrice" placeholder="Leave empty if not available" class="form-input" min="0">

        <label style="font-weight: 600; margin-bottom: 5px; display: block;">Business Class Price (AED)</label>
        <input type="number" id="businessClassPrice" placeholder="Leave empty if not available" class="form-input" min="0">

        <label style="font-weight: 600; margin-bottom: 5px; display: block;">Economy Class Price (AED) *</label>
        <input type="number" id="economyClassPrice" placeholder="Required" required class="form-input" min="0">

        <div id="flightError" style="color: #d32f2f; font-size: 0.9em; margin-top: 10px; display: none;"></div>

        <button type="submit" class="btn primary full-width" id="flightSubmitBtn" style="margin-top: 20px;">Create Flight</button>
      </form>
    </div>
  </div>

  <script src="admin.js"></script>
  <script src="admin-flights.js"></script>
</body>
</html>
